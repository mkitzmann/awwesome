version: '3.8'

services:
  awwesome:
    image: mkitzmann/awwesome:main
    environment:
      - PUBLIC_ANALYTICS_URL=${PUBLIC_ANALYTICS_URL}
      - PUBLIC_ANALYTICS_WEBSITE_ID=${PUBLIC_ANALYTICS_WEBSITE_ID}
      - TOKEN_GITHUB=${TOKEN_GITHUB}
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - data:/usr/src/app/data
    tmpfs:
      - /tmp
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
      labels:
        - 'traefik.enable=true'
        - 'traefik.http.routers.awwesome.rule=Host(`awweso.me`) || Host(`beta.awweso.me`) || Host(`www.awweso.me`)'
        - 'traefik.http.routers.awwesome.entrypoints=websecure'
        - 'traefik.http.routers.awwesome.tls=true'
        - 'traefik.http.services.awwesome.loadbalancer.server.port=3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - traefik

volumes:
  data:

networks:
  traefik:
    external: true
    name: traefik_traefik

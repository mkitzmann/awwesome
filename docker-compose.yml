version: '3'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: awwesome
    restart: unless-stopped
    ports:
      - '8080:3000'
    env_file:
      - .env
    working_dir: /usr/src/app
    command: sh -c "npm run seed && npm run build && node build"
    volumes:
      - db_data:/usr/src/app/data
volumes:
  db_data:

name: Build and Deploy

on:
  push:
    branches: [beta]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn run check

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test --run

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.repository.name }}
      SERVER_HOST: kserver
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Create app directory
        run: ssh -o StrictHostKeyChecking=no "admin@${SERVER_HOST}" "mkdir -p /opt/${APP_NAME}"

      - name: Write .env file
        env:
          PUBLIC_ANALYTICS_URL: ${{ secrets.PUBLIC_ANALYTICS_URL }}
          PUBLIC_ANALYTICS_WEBSITE_ID: ${{ secrets.PUBLIC_ANALYTICS_WEBSITE_ID }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: printf 'PUBLIC_ANALYTICS_URL=%s\nPUBLIC_ANALYTICS_WEBSITE_ID=%s\nTOKEN_GITHUB=%s\n' "$PUBLIC_ANALYTICS_URL" "$PUBLIC_ANALYTICS_WEBSITE_ID" "$TOKEN_GITHUB" | ssh -o StrictHostKeyChecking=no "admin@${SERVER_HOST}" "cat > /opt/${APP_NAME}/.env"

      - name: Copy compose file
        run: scp -o StrictHostKeyChecking=no "docker-compose.yml" "admin@${SERVER_HOST}:/opt/${APP_NAME}/docker-compose.yml"

      - name: Deploy stack
        run: |
          ssh -o StrictHostKeyChecking=no "admin@${SERVER_HOST}" "\
            cd /opt/${APP_NAME} && \
            docker compose config | grep -v '^name:' | docker stack deploy --with-registry-auth --resolve-image always -c - ${APP_NAME}"

      - name: Purge Cloudflare cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Format check
        run: yarn prettier --check .

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn run check

      - name: Test
        run: yarn test --run
